version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: makeup_user
      POSTGRES_PASSWORD: makeup_password
      POSTGRES_DB: makeup_booking
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://makeup_user:makeup_password@db:5432/makeup_booking
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key
      JWT_SECRET_KEY: dev-jwt-key
      FLASK_ENV: development
    depends_on:
      - db
      - redis

  celery:
    build: .
    environment:
      DATABASE_URL: postgresql://makeup_user:makeup_password@db:5432/makeup_booking
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: celery -A app.celery worker --loglevel=info

volumes:
  postgres_data:
  redis_data:volumes:
  postgres_data:
  redis_data:      REDIS_URL: redis://redis:6379/0
      MAIL_SERVER: ${MAIL_SERVER:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_DEFAULT_SENDER: ${MAIL_DEFAULT_SENDER}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery worker --loglevel=info

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html/static
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
