version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: makeup_user
      POSTGRES_PASSWORD: makeup_password
      POSTGRES_DB: makeup_booking
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    deploy:
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      restart_policy:
        condition: on-failure

  app:
    image: makeup-booking-app:latest
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://makeup_user:makeup_password@db:5432/makeup_booking
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key
      JWT_SECRET_KEY: dev-jwt-key
      FLASK_ENV: production
    depends_on:
      - db
      - redis
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    command: "gunicorn --bind 0.0.0.0:5000 --workers 4 --timeout 120 app:app"

  celery:
    image: makeup-booking-app:latest
    environment:
      DATABASE_URL: postgresql://makeup_user:makeup_password@db:5432/makeup_booking
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    command: "celery -A app.celery worker --loglevel=info"

volumes:
  postgres_data:
  redis_data:
volumes:
  postgres_data:
  redis_data:      - redis
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    command: >
      sh -c "sleep 15 &&
             celery -A app.celery worker --loglevel=info"

volumes:
  postgres_data:
  redis_data:    command: celery -A app.celery worker --loglevel=info

volumes:
  postgres_data:
  redis_data:
